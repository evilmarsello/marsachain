android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=35

# mergeExtDexDebug / D8: with default ~512m–1g often fails with OutOfMemoryError: Java heap space
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=768m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx2048m
