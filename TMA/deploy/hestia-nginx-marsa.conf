# Example nginx snippets for TMA static + upstream proxies.
# Replace READ_UPSTREAM / MINING_UPSTREAM / PUBLIC_HTML with your paths.
# For HestiaCP: append as custom include (nginx.ssl.conf_*), not the generated vhost.

# Read node (wallet UI, chain status, send tx)
location /fullnode/ {
    proxy_pass http://READ_UPSTREAM/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

# Pool backend (marsa-pool-api on same host, :8788)
location /api/pool/ {
    proxy_pass http://127.0.0.1:8788/api/pool/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

# Mining node API (often nginx :80 on mining host, not raw :8080)
location /mining/ {
    proxy_pass http://MINING_UPSTREAM/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location = / {
    root PUBLIC_HTML;
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
    etag off;
}

location = /index.html {
    root PUBLIC_HTML;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
    etag off;
}

location /kotlin/ {
    root PUBLIC_HTML;
    add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    expires -1;
}
