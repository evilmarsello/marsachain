# Пример: статика Mini App + прокси к fullnode + API проверки initData
upstream marsa_fullnode {
    server 127.0.0.1:8080;
}

upstream marsa_telegram_api {
    server 127.0.0.1:8787;
}

server {
    listen 443 ssl http2;
    server_name app.example.com;

    # ssl_certificate ...;

    root /var/www/marsa-tma/dist;
    index index.html;

    location /telegram/ {
        proxy_pass http://marsa_telegram_api/telegram/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fullnode/ {
        proxy_pass http://marsa_fullnode/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
