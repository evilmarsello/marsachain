# Example nginx upstreams for split read/mining nodes.
# Add as custom snippet in your panel (Hestia: nginx.ssl.conf_*).

upstream marsa_read_node {
    server READ_HOST:80;
}

upstream marsa_mining_node {
    server MINING_HOST:80;
}

location /fullnode/ {
    proxy_pass http://marsa_read_node/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location /mining/ {
    proxy_pass http://marsa_mining_node/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location / {
    try_files $uri $uri/ /index.html;
}
